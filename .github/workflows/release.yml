name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to deploy (e.g. v1.2.3)'
        required: true
      environment:
        type: choice
        options: [staging, production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DEPLOY_ENV: ${{ github.event.inputs.environment || 'production' }}
        run: |
          PROD_FLAG=""
          if [ "$DEPLOY_ENV" = "production" ]; then PROD_FLAG="--prod"; fi
          npx vercel pull --yes --environment="$DEPLOY_ENV" --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build $PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt $PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }}
